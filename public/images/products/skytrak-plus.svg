<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- SkyTrak device - compact box -->
  <rect x="95" y="60" width="90" height="70" fill="#2c2c2c" rx="8"/>
  <rect x="103" y="68" width="74" height="46" fill="#111" rx="4"/>
  <!-- Camera lens -->
  <circle cx="140" cy="91" r="16" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="140" cy="91" r="11" fill="#0a0a0a"/>
  <circle cx="140" cy="91" r="6" fill="#1e1e1e"/>
  <circle cx="137" cy="88" r="2" fill="white" opacity="0.3"/>
  <!-- SkyTrak branding -->
  <text x="140" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#00aaff" letter-spacing="1">SKYTRAK+</text>
  <!-- Status LED -->
  <circle cx="175" cy="68" r="4" fill="#00ff88"/>
  <!-- Hitting mat suggestion -->
  <rect x="75" y="130" width="130" height="12" fill="#2d5a1b" rx="4"/>
  <rect x="85" y="133" width="110" height="6" fill="#3a7a25" rx="2"/>
  <!-- Golf ball on mat -->
  <circle cx="140" cy="130" r="7" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="140" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a1a">SkyTrak+ Simulator</text>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Launch Monitor</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Body of rangefinder -->
  <rect x="95" y="40" width="90" height="120" fill="#1a3a5c" rx="10"/>
  <rect x="105" y="50" width="70" height="55" fill="#0d2137" rx="4"/>
  <!-- Lens circles -->
  <circle cx="140" cy="77" r="22" fill="#1a3a5c" stroke="#5599cc" stroke-width="2"/>
  <circle cx="140" cy="77" r="16" fill="#0a1929"/>
  <circle cx="140" cy="77" r="10" fill="#1e3d6e"/>
  <circle cx="137" cy="74" r="3" fill="white" opacity="0.3"/>
  <!-- Buttons -->
  <rect x="108" y="120" width="24" height="10" fill="#2d6a9f" rx="3"/>
  <rect x="148" y="120" width="24" height="10" fill="#e05c00" rx="3"/>
  <!-- Grip texture -->
  <rect x="95" y="90" width="8" height="60" fill="#122840" rx="2"/>
  <rect x="177" y="90" width="8" height="60" fill="#122840" rx="2"/>
  <!-- Brand label -->
  <rect x="105" y="148" width="70" height="8" fill="#0d2137" rx="2"/>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" font-weight="700" fill="#5599cc" letter-spacing="1">BUSHNELL</text>
  <!-- Product name below -->
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a3a5c">Tour V6 Shift</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Rangefinder</text>
</svg>
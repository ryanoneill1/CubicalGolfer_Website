<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Watch band top -->
  <rect x="122" y="22" width="36" height="28" fill="#1a1a1a" rx="4"/>
  <!-- Watch case -->
  <circle cx="140" cy="100" r="52" fill="#2c2c2c"/>
  <circle cx="140" cy="100" r="46" fill="#1a1a1a"/>
  <circle cx="140" cy="100" r="42" fill="#005073"/>
  <!-- Screen -->
  <circle cx="140" cy="100" r="36" fill="#001f2e"/>
  <!-- GPS course map display -->
  <path d="M118 92 Q130 80 145 85 Q158 90 155 105 Q150 118 138 116 Q122 114 118 100 Z" fill="#006990" opacity="0.6"/>
  <path d="M125 100 Q133 88 144 92 Q152 96 150 108 Q145 116 135 113 Z" fill="#007baa" opacity="0.5"/>
  <!-- Yardage text on screen -->
  <text x="140" y="96" text-anchor="middle" font-family="system-ui,monospace" font-size="18" font-weight="700" fill="white">157</text>
  <text x="140" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#7dc8e0">yards to pin</text>
  <!-- Crown button -->
  <rect x="188" y="93" width="8" height="14" fill="#3a3a3a" rx="2"/>
  <!-- Band bottom -->
  <rect x="122" y="150" width="36" height="28" fill="#1a1a1a" rx="4"/>
  <!-- Brand -->
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#005073">Garmin Approach S62</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">GPS Golf Watch</text>
</svg>
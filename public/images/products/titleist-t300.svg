  <rect x="100" y="128" width="72" height="30" fill="#c8102e" rx="4"/>
  <rect x="100" y="128" width="72" height="20" fill="#a8001e" rx="4 4 0 0"/>
  <rect x="103" y="131" width="64" height="16" fill="#b80018" rx="2"/>

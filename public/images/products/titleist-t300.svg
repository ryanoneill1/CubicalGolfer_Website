  <text x="143" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="white" font-weight="700">T300</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#c8102e">Titleist T300</text>

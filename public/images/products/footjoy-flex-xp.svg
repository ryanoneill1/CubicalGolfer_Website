<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Golf shoe side profile -->
  <!-- Sole -->
  <path d="M60 148 Q65 152 200 152 Q215 152 220 145 Q215 138 200 140 L65 140 Q60 140 60 148 Z" fill="#222"/>
  <!-- Spike nubs on sole -->
  <circle cx="85" cy="152" r="4" fill="#333"/>
  <circle cx="105" cy="153" r="4" fill="#333"/>
  <circle cx="125" cy="153" r="4" fill="#333"/>
  <circle cx="145" cy="153" r="4" fill="#333"/>
  <circle cx="165" cy="153" r="4" fill="#333"/>
  <circle cx="185" cy="151" r="4" fill="#333"/>
  <!-- Upper shoe -->
  <path d="M65 140 Q68 105 78 88 Q95 70 125 65 Q155 62 175 72 Q195 80 202 100 Q208 118 205 140 Z" fill="#002855"/>
  <!-- BOA dial (the distinctive feature) -->
  <circle cx="170" cy="105" r="15" fill="#c8a84b"/>
  <circle cx="170" cy="105" r="11" fill="#b89838"/>
  <circle cx="170" cy="105" r="7" fill="#c8a84b"/>
  <text x="170" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#1a1a1a">BOA</text>
  <!-- Lace area (BOA cable lines) -->
  <path d="M120 95 Q145 88 168 92" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <path d="M115 105 Q145 98 166 102" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <!-- Gore-tex waterproof badge area -->
  <rect x="82" y="125" width="48" height="12" fill="#1a3a5c" rx="3"/>
  <text x="106" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#aaccff">GORE-TEX®</text>
  <!-- FJ logo -->
  <text x="80" y="80" font-family="Georgia,serif" font-size="12" font-weight="700" fill="#c8a84b" opacity="0.6">FJ</text>
  <text x="140" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#002855">FootJoy Flex XP</text>
  <text x="140" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Shoe</text>
</svg>
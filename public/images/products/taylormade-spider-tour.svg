<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Spider Tour mallet - distinctive red frame -->
  <rect x="72" y="95" width="148" height="42" fill="#e63946" rx="4"/>
  <!-- Aluminum frame structure (open back mallet) -->
  <rect x="78" y="98" width="136" height="10" fill="#cc2233"/>
  <rect x="78" y="122" width="136" height="10" fill="#cc2233"/>
  <!-- Open back cavity -->
  <rect x="90" y="108" width="100" height="14" fill="#f8f9fa"/>
  <!-- Face insert -->
  <rect x="72" y="97" width="20" height="38" fill="#2a2a2a" rx="2 0 0 2"/>
  <line x1="76" y1="100" x2="76" y2="132" stroke="#444" stroke-width="0.7"/>
  <line x1="79" y1="100" x2="79" y2="132" stroke="#444" stroke-width="0.7"/>
  <line x1="82" y1="100" x2="82" y2="132" stroke="#444" stroke-width="0.7"/>
  <line x1="85" y1="100" x2="85" y2="132" stroke="#444" stroke-width="0.7"/>
  <rect x="84" y="26" width="7" height="72" fill="#aaa" rx="3" transform="rotate(4, 87, 58)"/>
  <rect x="80" y="18" width="14" height="32" fill="#1a1a1a" rx="4"/>
  <text x="175" y="117" text-anchor="end" font-family="system-ui,sans-serif" font-size="7" fill="white" font-weight="700">SPIDER TOUR</text>
  <text x="175" y="126" text-anchor="end" font-family="system-ui,sans-serif" font-size="6" fill="#ffaaaa">TaylorMade</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#e63946">TaylorMade Spider Tour</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Mallet Putter</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Towel body - dual sided -->
  <rect x="75" y="55" width="130" height="105" fill="#2d6a4f" rx="6"/>
  <!-- Waffle texture side (cleaning) -->
  <rect x="75" y="55" width="65" height="105" fill="#2d6a4f" rx="6 0 0 6"/>
  <g fill="#246a45" opacity="0.6">
    <rect x="80" y="60" width="8" height="8" rx="1"/><rect x="92" y="60" width="8" height="8" rx="1"/>
    <rect x="104" y="60" width="8" height="8" rx="1"/><rect x="116" y="60" width="8" height="8" rx="1"/>
    <rect x="80" y="72" width="8" height="8" rx="1"/><rect x="92" y="72" width="8" height="8" rx="1"/>
    <rect x="104" y="72" width="8" height="8" rx="1"/><rect x="116" y="72" width="8" height="8" rx="1"/>
    <rect x="80" y="84" width="8" height="8" rx="1"/><rect x="92" y="84" width="8" height="8" rx="1"/>
    <rect x="104" y="84" width="8" height="8" rx="1"/><rect x="116" y="84" width="8" height="8" rx="1"/>
    <rect x="80" y="96" width="8" height="8" rx="1"/><rect x="92" y="96" width="8" height="8" rx="1"/>
    <rect x="104" y="96" width="8" height="8" rx="1"/><rect x="116" y="96" width="8" height="8" rx="1"/>
  </g>
  <!-- Microfiber side (drying) -->
  <rect x="140" y="55" width="65" height="105" fill="#3d8a64" rx="0 6 6 0"/>
  <!-- Center divider -->
  <line x1="140" y1="55" x2="140" y2="160" stroke="#1a4a32" stroke-width="2"/>
  <!-- Labels on each side -->
  <text x="107" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="white" font-weight="600">SCRUB</text>
  <text x="172" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="white" font-weight="600">DRY</text>
  <!-- Magnetic clip -->
  <rect x="125" y="42" width="30" height="14" fill="#c8a84b" rx="5"/>
  <text x="140" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#1a1a1a" font-weight="700">MAGNETIC</text>
  <text x="140" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#2d6a4f">Frogger Amphibian Towel</text>
  <text x="140" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Towel</text>
</svg>
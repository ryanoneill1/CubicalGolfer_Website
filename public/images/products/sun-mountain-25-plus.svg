<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Carry bag with dual straps -->
  <rect x="100" y="38" width="80" height="130" fill="#1a3a5c" rx="10"/>
  <!-- Club dividers top -->
  <rect x="104" y="41" width="24" height="28" fill="#122840" rx="4"/>
  <rect x="132" y="41" width="24" height="28" fill="#122840" rx="4"/>
  <rect x="158" y="41" width="18" height="28" fill="#122840" rx="3"/>
  <!-- Grips visible -->
  <rect x="110" y="22" width="5" height="26" fill="#1a1a1a" rx="2"/>
  <rect x="120" y="19" width="5" height="29" fill="#1a1a1a" rx="2"/>
  <rect x="130" y="21" width="5" height="27" fill="#1a1a1a" rx="2"/>
  <rect x="140" y="23" width="5" height="24" fill="#1a1a1a" rx="2"/>
  <!-- Large main pocket -->
  <rect x="104" y="85" width="72" height="50" fill="#122840" rx="5"/>
  <rect x="108" y="89" width="64" height="42" fill="#1a3a5c" rx="4"/>
  <!-- Cooler pocket -->
  <rect x="104" y="142" width="72" height="22" fill="#0d2035" rx="0 0 6 6"/>
  <text x="140" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#5599cc">INSULATED</text>
  <!-- Dual straps on back -->
  <rect x="96" y="60" width="6" height="80" fill="#0d2035" rx="3"/>
  <rect x="178" y="60" width="6" height="80" fill="#0d2035" rx="3"/>
  <!-- Stand legs -->
  <rect x="100" y="162" width="6" height="20" fill="#888" rx="2" transform="rotate(-18,103,172)"/>
  <rect x="174" y="162" width="6" height="20" fill="#888" rx="2" transform="rotate(18,177,172)"/>
  <text x="140" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a3a5c">Sun Mountain 2.5+</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Blade putter with high-toe design -->
  <rect x="80" y="95" width="130" height="38" fill="#c0c0c0" rx="4"/>
  <rect x="80" y="95" width="130" height="22" fill="#d8d8d8" rx="4 4 0 0"/>
  <!-- Milled face lines -->
  <rect x="80" y="97" width="20" height="36" fill="#e8e8e8" rx="2 0 0 2"/>
  <line x1="83" y1="100" x2="83" y2="129" stroke="#bbb" stroke-width="0.8"/>
  <line x1="86" y1="100" x2="86" y2="129" stroke="#bbb" stroke-width="0.8"/>
  <line x1="89" y1="100" x2="89" y2="129" stroke="#bbb" stroke-width="0.8"/>
  <line x1="92" y1="100" x2="92" y2="129" stroke="#bbb" stroke-width="0.8"/>
  <line x1="95" y1="100" x2="95" y2="129" stroke="#bbb" stroke-width="0.8"/>
  <!-- Shaft -->
  <rect x="88" y="28" width="7" height="72" fill="#999" rx="3" transform="rotate(4, 91, 60)"/>
  <!-- Grip -->
  <rect x="84" y="20" width="15" height="32" fill="#1a1a1a" rx="4"/>
  <!-- Scotty branding on toe -->
  <text x="178" y="116" text-anchor="end" font-family="Georgia,serif" font-size="6" fill="#666" font-style="italic">Scotty Cameron</text>
  <text x="178" y="125" text-anchor="end" font-family="system-ui,sans-serif" font-size="6" fill="#888">PHANTOM X</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a1a">Scotty Cameron Phantom</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Putter</text>
</svg>
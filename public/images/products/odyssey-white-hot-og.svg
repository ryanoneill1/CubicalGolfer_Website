<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Putter head - mallet style from above -->
  <rect x="60" y="95" width="155" height="52" fill="#1a1a1a" rx="6"/>
  <!-- Face insert - White Hot -->
  <rect x="60" y="95" width="22" height="52" fill="#e8e8e8" rx="3 0 0 3"/>
  <!-- Top line sight aids -->
  <rect x="75" y="88" width="120" height="5" fill="#333" rx="2"/>
  <rect x="125" y="82" width="22" height="6" fill="#333" rx="2"/>
  <!-- Shaft -->
  <rect x="90" y="28" width="8" height="70" fill="#888" rx="3" transform="rotate(5, 94, 60)"/>
  <!-- Grip end -->
  <rect x="86" y="20" width="16" height="30" fill="#2a2a2a" rx="4"/>
  <!-- 2-ball alignment circles -->
  <circle cx="130" cy="121" r="10" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <circle cx="160" cy="121" r="10" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <!-- Odyssey branding on face insert -->
  <text x="71" y="119" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5" font-weight="700" fill="#333" transform="rotate(90,71,119)">ODYSSEY</text>
  <!-- "WHITE HOT" on head -->
  <text x="195" y="123" text-anchor="end" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#999" letter-spacing="1">WHITE HOT</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a1a">Odyssey White Hot OG</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Putter</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Cart bag - wider, more pockets, no stand legs -->
  <rect x="88" y="35" width="104" height="140" fill="#002147" rx="8"/>
  <!-- 14-way divider top -->
  <rect x="92" y="38" width="96" height="32" fill="#001030" rx="4"/>
  <!-- Club slots (14 visible) -->
  <line x1="103" y1="38" x2="103" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="113" y1="38" x2="113" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="123" y1="38" x2="123" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="133" y1="38" x2="133" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="143" y1="38" x2="143" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="153" y1="38" x2="153" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="163" y1="38" x2="163" y2="70" stroke="#002147" stroke-width="2"/>
  <line x1="173" y1="38" x2="173" y2="70" stroke="#002147" stroke-width="2"/>
  <!-- Main pocket -->
  <rect x="92" y="80" width="96" height="50" fill="#001030" rx="5"/>
  <rect x="96" y="84" width="88" height="42" fill="#002147" rx="4"/>
  <!-- External putter well -->
  <rect x="176" y="35" width="16" height="140" fill="#001530" rx="0 5 5 0"/>
  <text x="184" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#5599cc" transform="rotate(90,184,110)">PUTTER WELL</text>
  <!-- Bottom pocket -->
  <rect x="92" y="148" width="82" height="24" fill="#001030" rx="0 0 5 5"/>
  <text x="130" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ba0c2f" font-weight="700">CALLAWAY</text>
  <text x="140" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#002147">Callaway Fairway 14</text>
</svg>
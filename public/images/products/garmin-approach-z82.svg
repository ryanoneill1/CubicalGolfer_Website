<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Hybrid rangefinder/GPS device -->
  <rect x="90" y="35" width="100" height="130" fill="#1a1a2e" rx="10"/>
  <rect x="98" y="43" width="84" height="65" fill="#001020" rx="4"/>
  <!-- GPS map on screen -->
  <rect x="100" y="45" width="80" height="61" fill="#003050" rx="3"/>
  <path d="M110 70 Q120 58 135 62 Q148 66 145 78 Q140 88 128 86 Q112 84 110 74 Z" fill="#006890" opacity="0.7"/>
  <!-- Pin indicator on map -->
  <polygon points="130,68 134,78 126,78" fill="#e63946"/>
  <!-- Yardage display -->
  <text x="140" y="95" text-anchor="middle" font-family="system-ui,monospace" font-size="14" font-weight="700" fill="#00aaff">163</text>
  <text x="140" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#7dc8e0">TO PIN</text>
  <!-- Lens eyepiece -->
  <circle cx="100" cy="108" rx="10" ry="18" fill="#111"/>
  <ellipse cx="100" cy="108" rx="6" ry="13" fill="#0a0a0a"/>
  <!-- Buttons -->
  <rect x="105" y="125" width="28" height="9" fill="#2a2a4e" rx="3"/>
  <rect x="147" y="125" width="28" height="9" fill="#2a2a4e" rx="3"/>
  <text x="140" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" font-weight="700" fill="#00aaff" letter-spacing="1">GARMIN</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a2e">Garmin Approach Z82</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">GPS + Laser Hybrid</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Mirror frame -->
  <rect x="60" y="35" width="160" height="120" fill="#2d4a3e" rx="8"/>
  <!-- Mirror surface -->
  <rect x="68" y="43" width="144" height="104" fill="#b8d8c8" rx="5"/>
  <!-- Reflection effect -->
  <rect x="68" y="43" width="144" height="104" fill="url(#mirror)" rx="5" opacity="0.3"/>
  <!-- Eye alignment gates (the key feature) -->
  <line x1="110" y1="43" x2="110" y2="147" stroke="#e63946" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="170" y1="43" x2="170" y2="147" stroke="#e63946" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Center line -->
  <line x1="140" y1="43" x2="140" y2="147" stroke="#2d4a3e" stroke-width="1.5"/>
  <!-- Eye position indicator (circles) -->
  <circle cx="130" cy="70" r="8" fill="none" stroke="#e63946" stroke-width="2"/>
  <circle cx="150" cy="70" r="8" fill="none" stroke="#e63946" stroke-width="2"/>
  <!-- Putter path gates at bottom -->
  <rect x="118" y="128" width="8" height="14" fill="#e63946" rx="2"/>
  <rect x="154" y="128" width="8" height="14" fill="#e63946" rx="2"/>
  <!-- Putting mirror label -->
  <text x="140" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#1a3a2e" font-weight="600">EYE ALIGNMENT</text>
  <text x="140" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#1a3a2e">STROKE PATH</text>
  <text x="140" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#2d4a3e">Golf Putting Mirror</text>
  <text x="140" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Training Aid</text>
</svg>
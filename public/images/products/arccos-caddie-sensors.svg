<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Grip sensor (small button that plugs into grip end) -->
  <g transform="translate(140,90)">
    <!-- 3 sensors arranged -->
    <circle cx="-40" cy="0" r="14" fill="#1a1a2e" stroke="#4444aa" stroke-width="2"/>
    <circle cx="-40" cy="0" r="9" fill="#2222aa"/>
    <circle cx="-40" cy="0" r="4" fill="#4444cc"/>
    <circle cx="0" cy="0" r="14" fill="#1a1a2e" stroke="#4444aa" stroke-width="2"/>
    <circle cx="0" cy="0" r="9" fill="#2222aa"/>
    <circle cx="0" cy="0" r="4" fill="#4444cc"/>
    <circle cx="40" cy="0" r="14" fill="#1a1a2e" stroke="#4444aa" stroke-width="2"/>
    <circle cx="40" cy="0" r="9" fill="#2222aa"/>
    <circle cx="40" cy="0" r="4" fill="#4444cc"/>
    <!-- Sensor labels -->
    <text x="-40" y="22" text-anchor="middle" font-family="system-ui" font-size="7" fill="#4444aa">DRIVER</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui" font-size="7" fill="#4444aa">IRON</text>
    <text x="40" y="22" text-anchor="middle" font-family="system-ui" font-size="7" fill="#4444aa">WEDGE</text>
  </g>
  <!-- Signal waves -->
  <path d="M140 56 Q155 48 170 56" fill="none" stroke="#4444aa" stroke-width="1.5" opacity="0.5"/>
  <path d="M140 48 Q162 37 184 48" fill="none" stroke="#4444aa" stroke-width="1.5" opacity="0.3"/>
  <text x="140" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a2e">Arccos Caddie Sensors</text>
  <text x="140" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Auto Shot Tracking</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Launch monitor device body -->
  <rect x="85" y="55" width="110" height="80" fill="#1a1a1a" rx="10"/>
  <rect x="93" y="63" width="94" height="55" fill="#0a0a0a" rx="6"/>
  <!-- Screen readout -->
  <rect x="97" y="67" width="86" height="47" fill="#001a00" rx="4"/>
  <!-- Data on screen -->
  <text x="140" y="84" text-anchor="middle" font-family="system-ui,monospace" font-size="10" font-weight="700" fill="#00ff88">162 mph</text>
  <text x="140" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#00aa55">BALL SPEED</text>
  <text x="115" y="108" text-anchor="middle" font-family="system-ui,monospace" font-size="9" fill="#00ff88">14.2°</text>
  <text x="165" y="108" text-anchor="middle" font-family="system-ui,monospace" font-size="9" fill="#00ff88">2,650</text>
  <text x="115" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5" fill="#00aa55">LAUNCH</text>
  <text x="165" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5" fill="#00aa55">SPIN RPM</text>
  <!-- Radar dome on top -->
  <ellipse cx="140" cy="55" rx="18" ry="8" fill="#2a2a2a"/>
  <!-- Tripod legs -->
  <line x1="110" y1="135" x2="95" y2="165" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="135" x2="140" y2="168" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="135" x2="185" y2="165" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a1a">Rapsodo MLM2PRO</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Launch Monitor</text>
</svg>
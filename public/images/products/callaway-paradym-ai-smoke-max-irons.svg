<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Iron set - 3 irons in a fan -->
  <!-- Iron 1 (back) -->
  <rect x="148" y="30" width="8" height="118" fill="#888" rx="2" transform="rotate(8,152,90)"/>
  <rect x="148" y="128" width="38" height="22" fill="#1a1a1a" rx="2" transform="rotate(8,152,90)"/>
  <!-- Iron 2 (middle) -->
  <rect x="136" y="28" width="8" height="120" fill="#999" rx="2" transform="rotate(2,140,88)"/>
  <rect x="128" y="128" width="40" height="22" fill="#222" rx="2" transform="rotate(2,140,88)"/>
  <!-- Iron 3 (front) -->
  <rect x="122" y="26" width="8" height="122" fill="#aaa" rx="2" transform="rotate(-5,126,88)"/>
  <rect x="108" y="126" width="40" height="23" fill="#2a2a2a" rx="2" transform="rotate(-5,126,88)"/>
  <!-- Face detail on front iron -->
  <rect x="110" y="130" width="34" height="16" fill="#333" rx="1" transform="rotate(-5,126,88)"/>
  <!-- Callaway text -->
  <text x="140" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#ba0c2f" font-weight="700">CALLAWAY</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a1a1a">Paradym AI Smoke Max</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Irons</text>
</svg>
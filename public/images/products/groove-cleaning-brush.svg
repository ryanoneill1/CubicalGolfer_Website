<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Brush body -->
  <rect x="100" y="70" width="80" height="28" fill="#c8a84b" rx="6"/>
  <!-- Groove brush bristles side A (wire) -->
  <rect x="100" y="85" width="40" height="14" fill="#888" rx="0 0 4 4"/>
  <g stroke="#555" stroke-width="0.8">
    <line x1="104" y1="85" x2="104" y2="96"/><line x1="107" y1="85" x2="107" y2="97"/>
    <line x1="110" y1="85" x2="110" y2="96"/><line x1="113" y1="85" x2="113" y2="97"/>
    <line x1="116" y1="85" x2="116" y2="96"/><line x1="119" y1="85" x2="119" y2="97"/>
    <line x1="122" y1="85" x2="122" y2="96"/><line x1="125" y1="85" x2="125" y2="97"/>
    <line x1="128" y1="85" x2="128" y2="96"/><line x1="131" y1="85" x2="131" y2="97"/>
    <line x1="134" y1="85" x2="134" y2="96"/><line x1="137" y1="85" x2="137" y2="97"/>
  </g>
  <!-- Nylon bristles side B -->
  <rect x="140" y="85" width="40" height="14" fill="#2d6a4f" rx="0 0 4 4"/>
  <g stroke="#1a4a32" stroke-width="0.8">
    <line x1="144" y1="85" x2="144" y2="96"/><line x1="148" y1="85" x2="148" y2="97"/>
    <line x1="152" y1="85" x2="152" y2="96"/><line x1="156" y1="85" x2="156" y2="97"/>
    <line x1="160" y1="85" x2="160" y2="96"/><line x1="164" y1="85" x2="164" y2="97"/>
    <line x1="168" y1="85" x2="168" y2="96"/><line x1="172" y1="85" x2="172" y2="97"/>
  </g>
  <!-- Retractable zip line -->
  <circle cx="140" cy="65" r="12" fill="#1a1a1a"/>
  <circle cx="140" cy="65" r="8" fill="#333"/>
  <line x1="140" y1="53" x2="140" y2="38" stroke="#aaa" stroke-width="1.5"/>
  <!-- Clip end -->
  <path d="M134 35 Q140 28 146 35 L146 42 Q140 38 134 42 Z" fill="#c8a84b"/>
  <!-- Labels -->
  <text x="120" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#555">BRASS</text>
  <text x="160" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#2d6a4f">NYLON</text>
  <text x="140" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#333">Golf Groove Brush</text>
  <text x="140" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Club Cleaning Tool</text>
</svg>
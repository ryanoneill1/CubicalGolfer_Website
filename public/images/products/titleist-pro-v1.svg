<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Golf ball -->
  <circle cx="140" cy="95" r="58" fill="white"/>
  <circle cx="140" cy="95" r="58" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Dimple pattern - realistic -->
  <g fill="none" stroke="#bbb" stroke-width="0.8" opacity="0.7">
    <!-- Row 1 -->
    <circle cx="140" cy="42" r="3.5"/>
    <!-- Row 2 -->
    <circle cx="120" cy="48" r="3.5"/><circle cx="140" cy="48" r="3.5"/><circle cx="160" cy="48" r="3.5"/>
    <!-- Row 3 -->
    <circle cx="105" cy="58" r="3.5"/><circle cx="122" cy="56" r="3.5"/><circle cx="140" cy="55" r="3.5"/>
    <circle cx="158" cy="56" r="3.5"/><circle cx="175" cy="58" r="3.5"/>
    <!-- Row 4 -->
    <circle cx="93" cy="72" r="3.5"/><circle cx="110" cy="68" r="3.5"/><circle cx="127" cy="65" r="3.5"/>
    <circle cx="144" cy="64" r="3.5"/><circle cx="161" cy="65" r="3.5"/><circle cx="178" cy="68" r="3.5"/>
    <circle cx="186" cy="72" r="3.5"/>
    <!-- Middle rows -->
    <circle cx="86" cy="88" r="3.5"/><circle cx="102" cy="83" r="3.5"/><circle cx="119" cy="79" r="3.5"/>
    <circle cx="136" cy="78" r="3.5"/><circle cx="153" cy="79" r="3.5"/><circle cx="170" cy="83" r="3.5"/>
    <circle cx="186" cy="88" r="3.5"/><circle cx="193" cy="95" r="3.5"/>
    <circle cx="86" cy="102" r="3.5"/><circle cx="100" cy="95" r="3.5"/>
    <circle cx="102" cy="107" r="3.5"/><circle cx="119" cy="110" r="3.5"/>
    <circle cx="136" cy="112" r="3.5"/><circle cx="153" cy="110" r="3.5"/>
    <circle cx="170" cy="107" r="3.5"/><circle cx="186" cy="102" r="3.5"/>
  </g>
  <!-- Brand line -->
  <text x="140" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="700" fill="#c8102e">Pro V1</text>
  <text x="140" y="105" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#333">TITLEIST</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#c8102e">Titleist Pro V1</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Golf Ball (Dozen)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <rect width="280" height="200" fill="#f8f9fa" rx="8"/>
  <!-- Grip with sensor attached -->
  <rect x="125" y="30" width="30" height="120" fill="#2a2a2a" rx="5"/>
  <!-- Sensor pod -->
  <rect x="118" y="118" width="44" height="28" fill="#003366" rx="6"/>
  <circle cx="140" cy="132" r="8" fill="#0066cc"/>
  <circle cx="140" cy="132" r="4" fill="#0088ff"/>
  <!-- LED indicator -->
  <circle cx="155" cy="122" r="3" fill="#00ff88"/>
  <!-- Motion arc visualization -->
  <path d="M90 90 Q95 50 140 40 Q185 50 190 90" fill="none" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
  <path d="M100 100 Q105 65 140 55 Q175 65 180 100" fill="none" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#003366">Blast Motion Sensor</text>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">Swing Analyzer</text>
</svg>